name: Tests
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run keeper and types tests
        run: ./scripts/testing/test-package.sh

      - name: Test Summary
        if: always()
        run: echo "Test run completed"
