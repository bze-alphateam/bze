name: Tests
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run keeper and types tests
        run: |
          # Get all packages in x/ directory that end with /keeper or /types
          PACKAGES=$(go list ./x/... | grep -E '/(keeper|types|ante)$')

          if [ -z "$PACKAGES" ]; then
            echo "No keeper or types packages found"
            exit 1
          fi

          echo "Running tests for:"
          echo "$PACKAGES"
          echo ""

          # Run tests with verbose output and race detection
          go test -v -race -timeout 10m $PACKAGES

      - name: Test Summary
        if: always()
        run: echo "Test run completed"
