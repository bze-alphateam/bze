syntax = "proto3";
package bze.txfeecollector;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";

option go_package = "github.com/bze-alphateam/bze/x/txfeecollector/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "bze/x/txfeecollector/Params";
  option (gogoproto.equal) = true;

  cosmos.base.v1beta1.DecCoin ValidatorMinGasFee = 1 [
    (gogoproto.nullable)     = false,
    (gogoproto.moretags)      = "yaml:\"validator_min_gas_fee\"",
    (gogoproto.jsontag)      = "validator_min_gas_fee,omitempty"
  ];

  uint64 MaxBalanceIterations = 2 [
    (gogoproto.moretags) = "yaml:\"max_balance_iterations\"",
    (gogoproto.jsontag)      = "max_balance_iterations,omitempty"
  ];

  string CwDeployFeeDestination = 3 [
    (gogoproto.moretags) = "yaml:\"cw_deploy_fee_destination\"",
    (gogoproto.jsontag)  = "cw_deploy_fee_destination,omitempty"
  ];

  repeated cosmos.base.v1beta1.Coin CwDeployFee = 4 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.moretags)     = "yaml:\"cw_deploy_fee\"",
    (gogoproto.jsontag)      = "cw_deploy_fee,omitempty"
  ];

  // CwInstantiateFee is charged once per CosmWasm contract instantiation
  // (MsgInstantiateContract / MsgInstantiateContract2). MsgStoreAndInstantiateContract
  // pays both CwDeployFee and CwInstantiateFee. Destination follows
  // CwDeployFeeDestination — same routing policy as the deploy fee.
  repeated cosmos.base.v1beta1.Coin CwInstantiateFee = 5 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.moretags)     = "yaml:\"cw_instantiate_fee\"",
    (gogoproto.jsontag)      = "cw_instantiate_fee,omitempty"
  ];
}