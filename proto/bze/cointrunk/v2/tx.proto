syntax = "proto3";
package bze.cointrunk.v2;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/bze-alphateam/bze/x/cointrunk/v2types";

message MsgPayPublisherRespect {
  option           (amino.name) = "bze/x/cointrunk/v2/MsgPayPublisherRespect";
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string address = 2;
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false];
}

message MsgPayPublisherRespectResponse {
  uint64 respect_paid         = 1;
  uint64 publisher_reward     = 2;
  uint64 community_pool_funds = 3;
}
