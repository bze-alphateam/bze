ck.\n\nNOTE! The current_epoch_start_time may diverge significantly from the\nwall-clock time the epoch began at. Wall-clock time of epoch start may be\n\u003e\u003e current_epoch_start_time. Suppose current_epoch_start_time = 10,\nduration = 5. Suppose the chain goes offline at t=14, and comes back online\nat t=30, and produces blocks at every successive time. (t=31, 32, etc.)\n* The t=30 block will start the epoch for (10, 15]\n* The t=31 block will start the epoch for (15, 20]\n* The t=32 block will start the epoch for (20, 25]\n* The t=33 block will start the epoch for (25, 30]\n* The t=34 block will start the epoch for (30, 35]\n* The **t=36** block will start the epoch for (35, 40]","type":"string","format":"date-time"},"duration":{"description":"duration is the time in between epoch ticks.\nIn order for intended behavior to be met, duration should\nbe greater than the chains expected block time.\nDuration must be non-zero.","type":"string"},"epoch_counting_started":{"description":"epoch_counting_started is a boolean, that indicates whether this\nepoch timer has began yet.","type":"boolean"},"identifier":{"description":"identifier is a unique reference to this particular timer.","type":"string"},"start_time":{"description":"start_time is the time at which the timer first ever ticks.\nIf start_time is in the future, the epoch will not begin until the start\ntime.","type":"string","format":"date-time"}}},"bze.epochs.QueryCurrentEpochResponse":{"type":"object","properties":{"current_epoch":{"type":"string","format":"int64"}}},"bze.epochs.QueryEpochsInfoResponse":{"type":"object","properties":{"epochs":{"type":"array","items":{"type":"object","$ref":"#/definitions/bze.epochs.EpochInfo"}}}},"bze.rewards.MsgActivateTradingReward":{"type":"object","properties":{"creator":{"type":"string"},"reward_id":{"type":"string"}}},"bze.rewards.MsgActivateTradingRewardResponse":{"type":"object"},"bze.rewards.MsgClaimStakingRewards":{"type":"object","properties":{"creator":{"type